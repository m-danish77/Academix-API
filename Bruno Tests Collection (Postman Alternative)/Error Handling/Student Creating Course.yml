info:
  name: Student Creating Course
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/courses"
  body:
    type: json
    data: |-
      {
         "title": "Advanced Js",
         "description": "Learn Js in depth",
         "maxCapacity": 9,
         "price": 500
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
