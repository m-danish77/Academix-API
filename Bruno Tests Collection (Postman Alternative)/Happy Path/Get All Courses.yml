info:
  name: Get All Courses
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/courses?page=1&limit=5"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
