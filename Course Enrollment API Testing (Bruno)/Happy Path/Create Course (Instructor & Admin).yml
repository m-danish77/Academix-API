info:
  name: Create Course (Instructor & Admin)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/courses"
  body:
    type: json
    data: |-
      {
         "title": "Advanced JS",
         "description": "Learn JS in Depth",
         "maxCapacity": 9,
         "price": 200,
         "videoUrl": "https://youtu.be/E9oaDnkAUoo"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
